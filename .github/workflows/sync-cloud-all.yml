name: Sync Cloud All

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

concurrency:
  group: sync-cloud-all
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Validate sync environment
        shell: bash
        env:
          INPUT_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          INPUT_VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          INPUT_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          INPUT_FOOTBALL_DATA: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          INPUT_API_FOOTBALL: ${{ secrets.API_FOOTBALL_KEY }}
        run: bash scripts/ci/prepare-sync-env.sh

      - name: Full cloud sync (teams, squads, fixtures, standings)
        env:
          SUPABASE_URL: ${{ env.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}
          FOOTBALL_DATA_API_KEY: ${{ env.FOOTBALL_DATA_API_KEY }}
          API_FOOTBALL_KEY: ${{ env.API_FOOTBALL_KEY }}
          SKIP_PLAYER_ENRICH: '1'
        run: npm run sync:cloud:all
