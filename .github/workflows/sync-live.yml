name: Sync Live Matches

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

concurrency:
  group: sync-live
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Validate sync environment
        shell: bash
        env:
          INPUT_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          INPUT_VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          INPUT_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          INPUT_FOOTBALL_DATA: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          INPUT_API_FOOTBALL: ${{ secrets.API_FOOTBALL_KEY }}
        run: bash scripts/ci/prepare-sync-env.sh

      - name: Sync live matches & results → Supabase
        shell: bash
        env:
          INPUT_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          INPUT_VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          INPUT_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          INPUT_FOOTBALL_DATA: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          INPUT_API_FOOTBALL: ${{ secrets.API_FOOTBALL_KEY }}
        run: |
          set -euo pipefail
          resolve_supabase_url() {
            if [ -n "${INPUT_SUPABASE_URL:-}" ]; then printf '%s' "$INPUT_SUPABASE_URL"
            elif [ -n "${INPUT_VITE_SUPABASE_URL:-}" ]; then printf '%s' "$INPUT_VITE_SUPABASE_URL"
            fi
          }
          export SUPABASE_URL="$(resolve_supabase_url)"
          export SUPABASE_SERVICE_ROLE_KEY="${INPUT_SERVICE_ROLE}"
          [ -n "${INPUT_FOOTBALL_DATA:-}" ] && export FOOTBALL_DATA_API_KEY="${INPUT_FOOTBALL_DATA}"
          [ -n "${INPUT_API_FOOTBALL:-}" ] && export API_FOOTBALL_KEY="${INPUT_API_FOOTBALL}"
          echo "=== sync:live inicio $(date -u +%Y-%m-%dT%H:%M:%SZ) ==="
          echo "SUPABASE_URL set: $([ -n "${SUPABASE_URL:-}" ] && echo yes || echo no)"
          echo "FOOTBALL_DATA_API_KEY set: $([ -n "${FOOTBALL_DATA_API_KEY:-}" ] && echo yes || echo no)"
          echo "API_FOOTBALL_KEY set: $([ -n "${API_FOOTBALL_KEY:-}" ] && echo yes || echo no)"
          npm run sync:live
          echo "=== sync:live fin exit=$? ==="
